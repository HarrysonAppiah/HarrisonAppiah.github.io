---
layout: default
---

<main class="page-layout">

  <article class="page-content">

    <header class="page-header">
      <h1>{{ page.title }}</h1>

      {% if page.description %}
      <p class="page-description">
        {{ page.description }}
      </p>
      {% endif %}

      {% include meta.html post=page %}
    </header>

    <section class="page-body">
      {{ content }}
    </section>

  </article>

</main>
